<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">

<title>Videos &amp; Audio · Justin &amp; Charlotte Wedding Memories</title>
<meta name="description" content="Wedding videos, reception clips, and audio recordings for Justin and Charlotte MacKenzie.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<script src="../assets/js/site.js" defer></script>
<style>
.audio-group-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
  gap: 1.5rem;
}
.audio-group-card {
  display: flex;
  flex-direction: column;
  gap: 1rem;
}
.audio-stack {
  display: flex;
  flex-direction: column;
  gap: 1rem;
}
.audio-item {
  display: flex;
  flex-direction: column;
  gap: 0.45rem;
}
.audio-item-title {
  margin: 0;
  font-size: 0.98rem;
  font-weight: 600;
  color: var(--color-ink, #44464D);
}
.audio-item audio {
  width: 100%;
}
.media-note {
  margin: 0.85rem 0 0;
  text-align: center;
  font-size: 0.9rem;
  color: rgba(68, 70, 77, 0.78);
}

.video-link-list {
  display: flex;
  flex-direction: column;
  gap: 0.75rem;
  margin-top: 0.25rem;
}
.video-link-button {
  appearance: none;
  border: 1px solid rgba(47, 86, 179, 0.18);
  background: rgba(252, 251, 248, 0.92);
  color: var(--color-primary, #2F56B3);
  border-radius: 999px;
  padding: 0.75rem 1rem;
  font: inherit;
  font-weight: 600;
  text-align: center;
  cursor: pointer;
  transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
}
.video-link-button:hover,
.video-link-button:focus-visible {
  transform: translateY(-1px);
  border-color: rgba(47, 86, 179, 0.34);
  box-shadow: 0 10px 24px rgba(47, 86, 179, 0.10);
  outline: none;
}
.video-lightbox {
  position: fixed;
  inset: 0;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 1.5rem;
  background: rgba(21, 24, 31, 0.86);
  z-index: 1000;
}
.video-lightbox.open {
  display: flex;
}
.video-lightbox-dialog {
  position: relative;
  width: min(1100px, 100%);
  max-height: calc(100vh - 3rem);
  background: #FCFBF8;
  border-radius: 24px;
  box-shadow: 0 30px 60px rgba(0, 0, 0, 0.25);
  overflow: hidden;
}
.video-lightbox-close {
  position: absolute;
  top: 0.9rem;
  right: 1rem;
  width: 2.5rem;
  height: 2.5rem;
  border: 0;
  border-radius: 999px;
  background: rgba(68, 70, 77, 0.82);
  color: #FFFFFF;
  font-size: 1.8rem;
  line-height: 1;
  cursor: pointer;
  z-index: 2;
}
.video-lightbox-inner {
  padding: 1.25rem 1.25rem 1rem;
}
.video-lightbox-title {
  margin: 0 3rem 0.9rem 0;
  text-align: center;
}
.video-lightbox-frame-wrap {
  position: relative;
  width: 100%;
  padding-top: 56.25%;
  background: #111318;
  border-radius: 18px;
  overflow: hidden;
}
.video-lightbox-frame {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  border: 0;
}
@media (max-width: 640px) {
  .video-lightbox {
    padding: 0.75rem;
  }
  .video-lightbox-dialog {
    border-radius: 18px;
  }
  .video-lightbox-inner {
    padding: 1rem 1rem 0.85rem;
  }
}

</style>
<script>
window.addEventListener('load', function () {
  const data = window.WEDDING_DATA || {};

  const weddingCard = document.querySelector('.media-grid-single .media-card');
  if (weddingCard && !weddingCard.querySelector('.media-note')) {
    const note = document.createElement('p');
    note.className = 'media-note';
    note.textContent = 'Zoom recording made for family who could not attend, please excuse the quality.';

    const player = weddingCard.querySelector('.embed-frame, iframe, video, audio, .notice');
    if (player) {
      player.insertAdjacentElement('afterend', note);
    } else {
      weddingCard.appendChild(note);
    }
  }

  const videoLightbox = document.querySelector('.video-lightbox');
  const videoLightboxFrame = videoLightbox ? videoLightbox.querySelector('.video-lightbox-frame') : null;
  const videoLightboxTitle = videoLightbox ? videoLightbox.querySelector('.video-lightbox-title') : null;
  const videoLightboxClose = videoLightbox ? videoLightbox.querySelector('.video-lightbox-close') : null;

  const closeVideoLightbox = function () {
    if (!videoLightbox || !videoLightboxFrame) return;
    videoLightbox.classList.remove('open');
    videoLightbox.setAttribute('aria-hidden', 'true');
    videoLightboxFrame.setAttribute('src', 'about:blank');
    document.body.style.overflow = '';
  };

  const openVideoLightbox = function (item) {
    if (!videoLightbox || !videoLightboxFrame) return;
    videoLightboxFrame.setAttribute('src', item.embedUrl || '');
    if (videoLightboxTitle) videoLightboxTitle.textContent = item.title || '';
    videoLightbox.classList.add('open');
    videoLightbox.setAttribute('aria-hidden', 'false');
    document.body.style.overflow = 'hidden';
  };

  if (videoLightboxClose) {
    videoLightboxClose.addEventListener('click', closeVideoLightbox);
  }
  if (videoLightbox) {
    videoLightbox.addEventListener('click', function (event) {
      if (event.target === videoLightbox) closeVideoLightbox();
    });
    document.addEventListener('keydown', function (event) {
      if (!videoLightbox.classList.contains('open')) return;
      if (event.key === 'Escape') closeVideoLightbox();
    });
  }

  const renderLinkedVideoGroup = function (targetTitle, items) {
    if (!items || !items.length) return;
    const cards = Array.from(document.querySelectorAll('.media-grid .media-card'));
    const card = cards.find(function (entry) {
      const heading = entry.querySelector('h3');
      return heading && heading.textContent.trim() === targetTitle;
    });
    if (!card) return;

    card.classList.remove('coming-soon');

    const existingNotice = card.querySelector('.notice');
    if (existingNotice) existingNotice.remove();

    let list = card.querySelector('.video-link-list');
    if (!list) {
      list = document.createElement('div');
      list.className = 'video-link-list';
      card.appendChild(list);
    }

    items.forEach(function (item) {
      const link = document.createElement('button');
      link.type = 'button';
      link.className = 'video-link-button';
      link.textContent = item.title || 'Open video';
      link.addEventListener('click', function () {
        openVideoLightbox(item);
      });
      list.appendChild(link);
    });
  };

  const renderAudioGroup = function (targetId, heading, items) {
    const target = document.getElementById(targetId);
    if (!target) return;

    const card = document.createElement('article');
    card.className = 'media-card audio-group-card';

    const title = document.createElement('h3');
    title.textContent = heading;
    card.appendChild(title);

    const stack = document.createElement('div');
    stack.className = 'audio-stack';

    (items || []).forEach(function (item) {
      const wrapper = document.createElement('div');
      wrapper.className = 'audio-item';

      const label = document.createElement('p');
      label.className = 'audio-item-title';
      label.textContent = item.title || '';
      wrapper.appendChild(label);

      const player = document.createElement('audio');
      player.setAttribute('controls', 'controls');
      player.setAttribute('preload', 'none');
      player.src = item.src || '';
      wrapper.appendChild(player);

      stack.appendChild(wrapper);
    });

    card.appendChild(stack);
    target.appendChild(card);
  };

  renderLinkedVideoGroup('Reception Speeches', data.speechVideos || []);
  renderLinkedVideoGroup('Reception Songs', data.songVideos || []);
  renderAudioGroup('speech-audio-target', 'Reception Speeches (Audio Only)', data.speechAudio || []);
  renderAudioGroup('song-audio-target', 'Reception Songs (Audio Only)', data.songAudio || []);
});
</script>
</head>
